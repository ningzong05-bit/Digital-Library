<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>云端图书馆借阅系统用例图</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #ffffff;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: #1d2636;
    }
    .diagram {
      width: 1200px;
      height: 700px;
      display: none;
      background: #fff;
    }
    .diagram.active { display: block; }
    svg { width: 1200px; height: 700px; display: block; }
    .title {
      font-size: 34px;
      font-weight: 500;
      text-anchor: middle;
      fill: #172033;
      letter-spacing: 0;
    }
    .boundary {
      fill: #fff;
      stroke: #66758e;
      stroke-width: 2;
    }
    .boundary-title {
      font-size: 24px;
      fill: #2d3a4e;
      text-anchor: middle;
    }
    .usecase {
      fill: #eef6ff;
      stroke: #2563eb;
      stroke-width: 2;
    }
    .usecase-text {
      font-size: 20px;
      fill: #1d2636;
      stroke: #eef6ff;
      stroke-width: 6px;
      paint-order: stroke fill;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .actor-line,
    .assoc {
      fill: none;
      stroke: #637083;
      stroke-width: 2;
      stroke-linecap: round;
    }
    .actor-name {
      font-size: 26px;
      fill: #111827;
      text-anchor: middle;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="reader" class="diagram active">
    <svg viewBox="0 0 1200 700" role="img" aria-label="读者功能模块总用例图">
      <text class="title" x="600" y="58">读者功能模块总用例图</text>
      <g class="actor">
        <circle class="actor-line" cx="150" cy="270" r="20"></circle>
        <path class="actor-line" d="M150 290 L150 362 M105 322 L195 322 M150 362 L112 412 M150 362 L188 412"></path>
        <text class="actor-name" x="150" y="466">读者</text>
      </g>
      <rect class="boundary" x="300" y="112" width="825" height="528" rx="14"></rect>
      <text class="boundary-title" x="712" y="146">云端图书馆借阅系统</text>
      <g>
        <ellipse class="usecase" cx="520" cy="220" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="520" y="220">注册登录</text>
        <ellipse class="usecase" cx="520" cy="320" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="520" y="320">维护资料和市内地址</text>
        <ellipse class="usecase" cx="520" cy="420" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="520" y="420">查看年费押金和额度</text>
        <ellipse class="usecase" cx="520" cy="520" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="520" y="520">检索图书</text>
        <ellipse class="usecase" cx="905" cy="190" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="905" y="190">查看详情和预计可借</text>
        <ellipse class="usecase" cx="905" cy="280" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="905" y="280">线上借书</text>
        <ellipse class="usecase" cx="905" cy="370" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="905" y="370">选择自取或同城邮寄</text>
        <ellipse class="usecase" cx="905" cy="460" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="905" y="460">排队预约自动借阅</text>
        <ellipse class="usecase" cx="905" cy="550" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="905" y="550">到馆还书或到付寄回</text>
      </g>
      <path class="assoc" d="M205 334 L380 220"></path>
      <path class="assoc" d="M205 334 L380 320"></path>
      <path class="assoc" d="M205 334 L380 420"></path>
      <path class="assoc" d="M205 334 L380 520"></path>
      <path class="assoc" d="M205 334 L770 190"></path>
      <path class="assoc" d="M205 334 L770 280"></path>
      <path class="assoc" d="M205 334 L770 370"></path>
      <path class="assoc" d="M205 334 L770 460"></path>
      <path class="assoc" d="M205 334 L770 550"></path>
    </svg>
  </div>

  <div id="librarian" class="diagram">
    <svg viewBox="0 0 1200 700" role="img" aria-label="图书管理员功能模块总用例图">
      <text class="title" x="600" y="58">图书管理员功能模块总用例图</text>
      <g class="actor">
        <circle class="actor-line" cx="150" cy="270" r="20"></circle>
        <path class="actor-line" d="M150 290 L150 362 M105 322 L195 322 M150 362 L112 412 M150 362 L188 412"></path>
        <text class="actor-name" x="150" y="466">图书管理员</text>
      </g>
      <rect class="boundary" x="300" y="112" width="825" height="528" rx="14"></rect>
      <text class="boundary-title" x="712" y="146">云端图书馆借阅系统</text>
      <g>
        <ellipse class="usecase" cx="520" cy="220" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="520" y="220">图书入库和编辑</text>
        <ellipse class="usecase" cx="520" cy="320" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="520" y="320">确认待自取图书</text>
        <ellipse class="usecase" cx="520" cy="420" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="520" y="420">登记馆方寄出日</text>
        <ellipse class="usecase" cx="520" cy="520" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="520" y="520">处理异常订单</text>
        <ellipse class="usecase" cx="905" cy="190" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="905" y="190">现结寄出图书</text>
        <ellipse class="usecase" cx="905" cy="280" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="905" y="280">到付收书验收</text>
        <ellipse class="usecase" cx="905" cy="370" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="905" y="370">办理到馆还书</text>
        <ellipse class="usecase" cx="905" cy="460" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="905" y="460">处理排队异常</text>
        <ellipse class="usecase" cx="905" cy="550" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="905" y="550">损坏追责和扣押金</text>
      </g>
      <path class="assoc" d="M205 334 L380 220"></path>
      <path class="assoc" d="M205 334 L380 320"></path>
      <path class="assoc" d="M205 334 L380 420"></path>
      <path class="assoc" d="M205 334 L380 520"></path>
      <path class="assoc" d="M205 334 L770 190"></path>
      <path class="assoc" d="M205 334 L770 280"></path>
      <path class="assoc" d="M205 334 L770 370"></path>
      <path class="assoc" d="M205 334 L770 460"></path>
      <path class="assoc" d="M205 334 L770 550"></path>
    </svg>
  </div>

  <div id="admin" class="diagram">
    <svg viewBox="0 0 1200 700" role="img" aria-label="系统管理员功能模块总用例图">
      <text class="title" x="600" y="58">系统管理员功能模块总用例图</text>
      <g class="actor">
        <circle class="actor-line" cx="150" cy="270" r="20"></circle>
        <path class="actor-line" d="M150 290 L150 362 M105 322 L195 322 M150 362 L112 412 M150 362 L188 412"></path>
        <text class="actor-name" x="150" y="466">系统管理员</text>
      </g>
      <rect class="boundary" x="300" y="112" width="825" height="528" rx="14"></rect>
      <text class="boundary-title" x="712" y="146">云端图书馆借阅系统</text>
      <g>
        <ellipse class="usecase" cx="520" cy="220" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="520" y="220">用户和角色管理</text>
        <ellipse class="usecase" cx="520" cy="320" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="520" y="320">分类和馆藏配置</text>
        <ellipse class="usecase" cx="520" cy="420" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="520" y="420">借阅期限规则</text>
        <ellipse class="usecase" cx="520" cy="520" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="520" y="520">年费押金标准管理</text>
        <ellipse class="usecase" cx="905" cy="190" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="905" y="190">同城配送范围</text>
        <ellipse class="usecase" cx="905" cy="280" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="905" y="280">年度寄送次数</text>
        <ellipse class="usecase" cx="905" cy="370" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="905" y="370">公告通知管理</text>
        <ellipse class="usecase" cx="905" cy="460" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="905" y="460">统计报表分析</text>
        <ellipse class="usecase" cx="905" cy="550" rx="145" ry="36"></ellipse>
        <text class="usecase-text" x="905" y="550">日志和数据维护</text>
      </g>
      <path class="assoc" d="M205 334 L380 220"></path>
      <path class="assoc" d="M205 334 L380 320"></path>
      <path class="assoc" d="M205 334 L380 420"></path>
      <path class="assoc" d="M205 334 L380 520"></path>
      <path class="assoc" d="M205 334 L770 190"></path>
      <path class="assoc" d="M205 334 L770 280"></path>
      <path class="assoc" d="M205 334 L770 370"></path>
      <path class="assoc" d="M205 334 L770 460"></path>
      <path class="assoc" d="M205 334 L770 550"></path>
    </svg>
  </div>

  <script>
    document.querySelectorAll("svg").forEach((svg) => {
      svg.querySelectorAll(".usecase-text").forEach((text) => {
        svg.appendChild(text.cloneNode(true));
      });
    });
    const key = (location.hash || "#reader").slice(1);
    document.querySelectorAll(".diagram").forEach((item) => item.classList.remove("active"));
    (document.getElementById(key) || document.getElementById("reader")).classList.add("active");
  </script>
</body>
</html>
